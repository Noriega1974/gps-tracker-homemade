name: Deploy

on:
  push:
    branches: [ main, dev, devdaniel, devpolo, devivan ]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy DEV a EC2 Jose
        uses: appleboy/ssh-action@master
        with:
          host: gpstracker3.ddns.net
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/dev
            git fetch origin
            git reset --hard origin/dev
            echo 'DB_HOST=${{ secrets.DB_HOST }}' > .env
            echo 'DB_USER=${{ secrets.DB_USER }}' >> .env
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env
            echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env
            echo "DB_PORT=5432" >> .env
            echo "INSTANCE_NAME=GPS-DEV-JOSE" >> .env
            echo 'UPLOAD_PASSWORD=${{ secrets.UPLOAD_PASSWORD }}' >> .env
            npm install
            pm2 reload gps-dev 2>/dev/null || pm2 start /home/ubuntu/dev/server.js --name gps-dev
            pm2 save

